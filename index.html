<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0;url=https://links.salaryboxapp.com/support">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SalaryBox Renewal</title>
<script>
window.location.replace("https://links.salaryboxapp.com/support");
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial,sans-serif;background:#fff;text-align:center;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.box{max-width:340px;width:100%}
.logo{font-size:42px;font-weight:800;margin-bottom:24px;letter-spacing:-1px}
.salary{color:#0EA5E9}
.box-text{color:#10B981}
p{color:#666;margin-bottom:28px;font-size:16px;line-height:1.5}
.btn{display:inline-block;padding:16px 40px;background:linear-gradient(135deg,#0EA5E9 0%,#10B981 100%);color:#fff;text-decoration:none;border-radius:12px;font-weight:700;font-size:17px;box-shadow:0 8px 24px rgba(14,165,233,0.3);transition:transform 0.2s}
.btn:active{transform:scale(0.97)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #e0e0e0;border-top-color:#0EA5E9;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box">
<div class="logo"><span class="salary">Salary</span><span class="box-text">Box</span></div>
<p><span class="spinner"></span>Opening renewal page...</p>
<a href="https://links.salaryboxapp.com/support" class="btn">Tap to Continue</a>
</div>
</body>
</html>
